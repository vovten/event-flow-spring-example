event-flow:
  enabled: true
  publisher:
    enabled: true
    transactional: true
    retry:
      enabled: true
      max-attempts: 3
    logging:
      enabled: true
    channels:
      - name: internal
        transports:
          - name: local-queue
      - name: external
        transports:
          - name: kafka
            servers: 192.168.1.39:9092
            topics: test2
            serialization: json
      - name: broadcast
        transports:
          - name: kafka
            servers: 192.168.1.39:9092
            topics: test2
  dispatcher:
    enabled: true
    listener-packages: io.github.vovten.eventflow.example
    deserialization:
      allowed-event-packages:
        - com.custom
    idempotent:
      enabled: true
    logging:
      enabled: true
    transports:
      - name: local-queue
      - name: kafka
        topics: test2
        servers: 192.168.1.39:9092

